################################################################################
#                                                                              #
#                                                                              #
#                          Tech Bench Docker Installation                      #
#           NOTE:  Check .env file for necessary fields to modify to           #
#                        secure this Tech Bench installation                   #
#                                                                              #
#                                                                              #
################################################################################
networks:
    app-tier:
        driver: bridge
volumes:
    appData:
    dbData:
    redisData:
    meilisearchData:

services:
    # Application Container
    tech_bench:
        container_name: tech_bench
        restart: unless-stopped
        stop_signal: SIGTERM
        image: butcherman/tech_bench_app:${APP_VERSION:-latest}
        volumes:
            - appData:/var/www/html
            - ./.env:/var/www/html/.env
        environment:
            - SERVICE=app
        networks:
            - app-tier
        healthcheck:
            test: ["CMD", "php-fpm-healthcheck"]
            interval: 30s
            timeout: 10s
            retries: 10
        depends_on:
            database:
                condition: service_healthy

    # NGINX Web Server
    nginx:
        image: butcherman/tech_bench_nginx:2.0
        container_name: nginx
        restart: unless-stopped
        stop_signal: SIGTERM
        volumes:
            - appData:/var/www/html
            - ./.env:/var/www/.env
        ports:
            - "80:80"
            - "443:443"
        networks:
            - app-tier
        depends_on:
            tech_bench:
                condition: service_healthy

    # Reverb Container for Websockets
    reverb:
        container_name: reverb
        restart: unless-stopped
        stop_signal: SIGTERM
        image: butcherman/tech_bench_app:${APP_VERSION:-latest}
        volumes:
            - appData:/var/www/html
            - ./.env:/var/www/html/.env
        networks:
            - app-tier
        command: ['php', '/var/www/html/artisan', 'reverb:start']
        depends_on:
            tech_bench:
                condition: service_healthy

    # Horizon Container to run background jobs
    horizon:
        container_name: horizon
        restart: unless-stopped
        stop_signal: SIGTERM
        image: butcherman/tech_bench_app:${APP_VERSION:-latest}
        volumes:
            - ../src:/var/www/html
            - ./.env:/var/www/html/.env
        networks:
            - app-tier
        command: ["php", "/var/www/html/artisan", "horizon"]
        depends_on:
            tech_bench:
                condition: service_healthy

    # Scheduler Container
    scheduler:
        container_name: scheduler
        restart: unless-stopped
        stop_signal: SIGTERM
        image: butcherman/tech_bench_app:${APP_VERSION:-latest}
        volumes:
            - ../src:/var/www/html
            - ./.env:/var/www/html/.env
        networks:
            - app-tier
        command: ["php", "/var/www/html/artisan", "schedule:work"]
        depends_on:
            tech_bench:
                condition: service_healthy

    # MySQL Database Container
    database:
        image: butcherman/tech_bench_database:2.0
        container_name: database
        restart: unless-stopped
        stop_signal: SIGTERM
        volumes:
            - dbData:/var/lib/mysql
        networks:
            - app-tier
        ports:
            - "3306:3306"
        healthcheck:
            test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
            interval: 15s
            timeout: 5s
            retries: 6

    # Redis Container for Cache, Job and Email Queuing
    redis:
        image: butcherman/tech_bench_redis:2.0
        container_name: redis
        restart: unless-stopped
        stop_signal: SIGTERM
        volumes:
            - redisData:/data
        networks:
            - app-tier

    # Melisearch Container for Search Engine
    meilisearch:
        image: butcherman/tech_bench_meilisearch:1.1
        container_name: meilisearch
        restart: unless-stopped
        stop_signal: SIGTERM
        volumes:
            - meilisearchData:/meili_data
        networks:
            - app-tier
        depends_on:
            database:
                condition: service_healthy
